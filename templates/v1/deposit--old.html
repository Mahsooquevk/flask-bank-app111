<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deposit Money</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

.container{
width:420px;
padding:35px;
border-radius:15px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(12px);
box-shadow:0 0 25px rgba(0,0,0,0.4);
}

h2{
text-align:center;
margin-bottom:25px;
font-size:28px;
}

label{
font-size:14px;
opacity:0.9;
}

select,input{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:18px;
border:none;
border-radius:8px;
outline:none;
font-size:14px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 15px #00c6ff;
}

.back{
display:block;
text-align:center;
margin-top:18px;
font-size:13px;
}

.back a{
color:#00e0ff;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<h2>💰 Deposit Money</h2>

<form method="post">

<label>Customer</label>
<select name="customer">

{% for c in customers %}
<option value="{{c.id}}">{{c.name}}</option>
{% endfor %}

</select>

<label>Amount</label>
<input name="amount" placeholder="Enter deposit amount" required>

<button type="submit">Deposit Money</button>

</form>

<div class="back">
<a href="/dashboard">⬅ Back to Dashboard</a>
</div>

</div>

</body>
</html>
