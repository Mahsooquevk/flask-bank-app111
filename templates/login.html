<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Finance Bank</title>
<!-- ====== ADD THIS INSIDE <head> OF ALL YOUR HTML TEMPLATES ====== -->

<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#00c6ff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PF Bank">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">

<script>
  // Register Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/static/sw.js')
        .then(reg => console.log('SW registered'))
        .catch(err => console.log('SW error:', err));
    });
  }

  // Show Install Button (Android Chrome)
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    const btn = document.getElementById('installBtn');
    if (btn) btn.style.display = 'block';
  });

  function installApp() {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
    }
  }
</script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.container{
width:380px;
padding:40px;
border-radius:15px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(12px);
box-shadow:0 0 25px rgba(0,0,0,0.4);
color:white;
}

.logo{
text-align:center;
font-size:28px;
font-weight:bold;
margin-bottom:25px;
letter-spacing:1px;
}

.logo span{
color:#00e0ff;
}

form input{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:18px;
border:none;
border-radius:8px;
outline:none;
font-size:15px;
}

form label{
font-size:14px;
opacity:0.9;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#00c6ff;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 15px #00c6ff;
}

.footer{
text-align:center;
margin-top:18px;
font-size:13px;
opacity:0.8;
}

.footer a{
color:#00e0ff;
text-decoration:none;
}

.security{
text-align:center;
font-size:12px;
margin-top:10px;
opacity:0.7;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
🏦 <span>Personal Finance Bank</span>
</div>

<form method="post">

<label>Username</label>
<input name="username" placeholder="Enter your username" required>

<label>Password</label>
<input type="password" name="password" placeholder="Enter your password" required>

<button type="submit">Secure Login</button>

</form>

<div class="security">
🔒 Your connection is secure
</div>

<div class="footer">
Forgot password? <a href="#">Recover</a>
</div>

</div>

</body>
</html>
