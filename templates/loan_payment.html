<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Repayment</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

.container{
width:450px;
padding:35px;
border-radius:15px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(12px);
box-shadow:0 0 25px rgba(0,0,0,0.4);
}

h2{
text-align:center;
margin-bottom:25px;
font-size:28px;
}

label{
font-size:14px;
opacity:0.9;
}

select,input{
width:100%;
padding:12px;
margin-top:6px;
border:none;
border-radius:8px;
outline:none;
font-size:14px;
margin-bottom:18px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#ff7b00,#ff3d00);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 15px #ff7b00;
}

.back{
display:block;
text-align:center;
margin-top:18px;
font-size:13px;
}

.back a{
color:#00e0ff;
text-decoration:none;
}

.error{
color:#ff4d4d;
text-align:center;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">

<h2>💰 Loan Repayment</h2>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="post">

<!-- Loan Selection -->
<label>Select Loan</label>
<select name="loan" id="loanSelect" required>
    <option value="">Select Loan</option>
    {% for l in loans %}
    <option value="{{l.id}}" 
            data-name="{{l.name}}" 
            data-acc="{{l.account_number}}">
        {{l.name}} ({{l.account_number}})
    </option>
    {% endfor %}
</select>

<!-- Customer Name -->
<label>Customer Name</label>
<input type="text" id="nameInput" readonly placeholder="Auto-filled">

<!-- Account Number -->
<label>Account Number</label>
<input type="text" id="accountInput" readonly placeholder="Auto-filled">

<!-- Amount -->
<label>Amount</label>
<input name="amount" type="number" placeholder="Enter payment amount" required>

<button type="submit">Pay Loan</button>

</form>

<div class="back">
<a href="/dashboard">⬅ Back to Dashboard</a>
</div>

</div>

<!-- ✅ AUTO FILL SCRIPT -->
<script>

let loanSelect = document.getElementById("loanSelect");
let nameInput = document.getElementById("nameInput");
let accountInput = document.getElementById("accountInput");

loanSelect.addEventListener("change", function(){

    let selectedOption = this.options[this.selectedIndex];

    let name = selectedOption.getAttribute("data-name");
    let acc = selectedOption.getAttribute("data-acc");

    nameInput.value = name || "";
    accountInput.value = acc || "";

});

</script>

<!-- 🔴 AUTO LOGOUT (same as your system) -->
<script>

let warningTime = 25000;
let logoutTime = 30000;

setTimeout(function () {

    let popup = document.createElement("div");
    popup.innerHTML = `
        <div style="
            position:fixed;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            background:#fff;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,0.3);
            text-align:center;
            z-index:9999;
        ">
            <h3 style="color:red;">⚠ Session Expiring!</h3>
            <p>You will be logged out in 5 seconds.</p>
            <button onclick="stayLoggedIn()" style="
                padding:8px 15px;
                background:green;
                color:white;
                border:none;
                border-radius:5px;
                cursor:pointer;
            ">Stay Logged In</button>
        </div>
    `;
    document.body.appendChild(popup);

}, warningTime);

setTimeout(function () {
    window.location.href = "/logout";
}, logoutTime);

function stayLoggedIn() {
    location.reload();
}

</script>

</body>
</html>
