<h2>💰 Deposit Report</h2>

<table border="1">
<tr>
<th>Name</th><th>Account</th><th>Amount</th><th>Date</th>
</tr>

{% for row in data %}
<tr>
<td>{{row.name}}</td>
<td>{{row.account_number}}</td>
<td>{{row.amount}}</td>
<td>{{row.date}}</td>
</tr>
{% endfor %}
</table>

<h3>Total: {{total}}</h3>
<a href="/report">⬅ Back</a>
